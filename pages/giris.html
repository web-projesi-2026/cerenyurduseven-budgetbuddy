<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Giriş Yap – BudgetBuddy</title>
  <link rel="stylesheet" href="../assets/css/style.css?v=14" />
  <style>
    /* ── Güvenlik rozeti ── */
    .security-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.2);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: .8rem;
      color: #22c55e;
    }
    .security-badge svg { flex-shrink: 0; }

    /* ── Sevimli yüz karakteri ── */
    .buddy-face-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }
    .buddy-face {
      position: relative;
      width: 72px;
      height: 72px;
    }
    /* Kafa */
    .buddy-face .head {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #fde68a, #fbbf24);
      border-radius: 50%;
      position: relative;
      box-shadow: 0 4px 16px rgba(251,191,36,.3);
      transition: all .3s;
    }
    /* Gözler */
    .buddy-face .eyes {
      position: absolute;
      top: 24px; left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 14px;
    }
    .buddy-face .eye {
      width: 10px; height: 10px;
      background: #1e2330;
      border-radius: 50%;
      transition: all .3s ease;
      position: relative;
      overflow: hidden;
    }
    /* Kapalı göz = yassı */
    .buddy-face.typing .eye {
      height: 3px;
      border-radius: 2px;
      margin-top: 3px;
    }
    /* Mutlu göz */
    .buddy-face.happy .eye {
      background: #1e2330;
      height: 10px;
    }
    /* Hata gözü */
    .buddy-face.error .eye {
      background: #ef4444;
    }
    /* Göz parıltısı */
    .buddy-face .eye::after {
      content: '';
      position: absolute;
      width: 3px; height: 3px;
      background: white;
      border-radius: 50%;
      top: 1px; right: 1px;
    }
    /* Ağız */
    .buddy-face .mouth {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px; height: 12px;
      border: 3px solid #1e2330;
      border-top: none;
      border-radius: 0 0 24px 24px;
      transition: all .3s;
    }
    .buddy-face.typing .mouth {
      width: 16px; height: 8px;
      border-radius: 0 0 16px 16px;
    }
    .buddy-face.error .mouth {
      border-radius: 24px 24px 0 0;
      border-top: 3px solid #1e2330;
      border-bottom: none;
      bottom: 16px;
    }
    .buddy-face.happy .mouth {
      width: 30px; height: 14px;
    }
    /* Yanaklar */
    .buddy-face .cheeks {
      position: absolute;
      top: 34px; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 6px;
    }
    .buddy-face .cheek {
      width: 14px; height: 8px;
      background: rgba(251,113,133,.4);
      border-radius: 50%;
      transition: opacity .3s;
    }
    .buddy-face.typing .cheek { opacity: 0; }
    .buddy-face.happy .cheek { opacity: 1; background: rgba(251,113,133,.6); }

    /* Yazı etiketi */
    .password-label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    /* Şifre input */
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 44px; }
    .toggle-pw {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 4px;
      color: var(--text-3);
      display: flex; align-items: center;
    }
    .toggle-pw:hover { color: var(--text-1); }
    .toggle-pw svg { transition: all .2s; }

    /* Animasyonlar */
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .buddy-face.happy .head {
      animation: bounce .4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-4px); }
      75%      { transform: translateX(4px); }
    }
    .buddy-face.error .head {
      animation: shake .4s ease;
    }
  </style>
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon">💰</div>
    <span>BudgetBuddy</span>
  </div>
  <h1 class="auth-title">Tekrar hoş geldin</h1>
  <p class="auth-sub">Bütçeni yönetmeye devam et</p>

  <div class="security-badge">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6l-8-4z" fill="#22c55e" opacity=".3"/><path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6l-8-4z" stroke="#22c55e" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 12l2 2 4-4" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/></svg>
    256-bit SSL şifreleme ile korunmaktadır. Verileriniz güvende!
  </div>

  <form class="auth-form" id="loginForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="email">E-posta Adresi</label>
      <input class="form-control" type="email" id="email" placeholder="ornek@email.com" required autocomplete="email" />
    </div>

    <div class="form-group">
      <!-- Sevimli yüz -->
      <div class="buddy-face-wrap">
        <div class="buddy-face" id="buddyFace">
          <div class="head">
            <div class="cheeks">
              <div class="cheek"></div>
              <div class="cheek"></div>
            </div>
            <div class="eyes">
              <div class="eye"></div>
              <div class="eye"></div>
            </div>
            <div class="mouth"></div>
          </div>
        </div>
      </div>

      <div class="password-label-row">
        <label class="form-label" for="sifre" style="margin-bottom:0;">Şifre</label>
      </div>
      <div class="password-wrapper">
        <input class="form-control" type="password" id="sifre" placeholder="••••••••" required autocomplete="current-password" />
        <button type="button" class="toggle-pw" id="togglePw" title="Şifreyi göster/gizle">
          <!-- Göz ikonu -->
          <svg id="eyeOpen" width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
          <svg id="eyeClosed" width="20" height="20" viewBox="0 0 24 24" fill="none" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;justify-content:center;padding:13px;">
      Giriş Yap
    </button>
    <div id="errorMsg" style="color:var(--red);font-size:.85rem;text-align:center;display:none;margin-top:8px;"></div>
  </form>

  <p class="auth-footer">
    Hesabın yok mu? <a href="kayit.html">Ücretsiz kaydol</a>
  </p>
</div>

<div id="toast-container"></div>
<script src="../assets/js/main.js?v=14"></script>
<script>
// Yönlendirme
(async () => {
  try {
    const d = await Auth.ben();
    if (d?.user) window.location.href = '/cerenyurduseven-budgetbuddy/index.html';
  } catch {}
})();

const face     = document.getElementById('buddyFace');
const sifreEl  = document.getElementById('sifre');
const togglePw = document.getElementById('togglePw');
const eyeOpen  = document.getElementById('eyeOpen');
const eyeClosed= document.getElementById('eyeClosed');

function setFace(state) {
  face.className = 'buddy-face ' + state;
}

// Şifre alanı etkileşimleri
sifreEl.addEventListener('focus',  () => setFace(''));
sifreEl.addEventListener('input',  () => setFace(sifreEl.value.length > 0 ? 'typing' : ''));
sifreEl.addEventListener('blur',   () => setFace(''));

// Göster/Gizle butonu
togglePw.addEventListener('click', () => {
  if (sifreEl.type === 'password') {
    sifreEl.type = 'text';
    eyeOpen.style.display  = 'none';
    eyeClosed.style.display= 'block';
    setFace('error'); // şaşırmış yüz
    setTimeout(() => setFace(''), 600);
  } else {
    sifreEl.type = 'password';
    eyeOpen.style.display  = 'block';
    eyeClosed.style.display= 'none';
    setFace('typing');
  }
});

// Giriş formu
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn   = document.getElementById('submitBtn');
  const errEl = document.getElementById('errorMsg');
  const email = document.getElementById('email').value.trim();
  const sifre = sifreEl.value;

  if (!email || !sifre) {
    errEl.textContent = 'Lütfen tüm alanları doldurun.';
    errEl.style.display = 'block';
    setFace('error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="margin:0 auto;"></div>';
  errEl.style.display = 'none';
  setFace('typing');

  try {
    const data = await Auth.giris(email, sifre);
    if (data?.success) {
      setFace('happy');
      Toast.success('Giriş başarılı! Yönlendiriliyorsunuz...');
      setTimeout(() => window.location.href = '/cerenyurduseven-budgetbuddy/index.html', 900);
    }
  } catch (err) {
    setFace('error');
    errEl.textContent = err.message || 'Giriş yapılırken bir hata oluştu.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Giriş Yap';
    setTimeout(() => setFace(''), 1500);
  }
});
</script>
</body>
</html>
