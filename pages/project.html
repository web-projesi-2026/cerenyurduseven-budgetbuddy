<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İşlemler – BudgetBuddy</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">💰</div>
      <span>BudgetBuddy</span>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-title">Genel</span>
      <a class="nav-link" href="../index.html"><i data-lucide="layout-dashboard"></i> Panel</a>
      <a class="nav-link active" href="project.html"><i data-lucide="list"></i> İşlemler</a>
      <span class="nav-section-title">Hesap</span>
      <a class="nav-link" href="about.html"><i data-lucide="user"></i> Profilim</a>
      <a class="nav-link" href="contact.html"><i data-lucide="mail"></i> Destek</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" id="logoutBtn" title="Çıkış yap">
        <div class="user-avatar" id="userInitials">--</div>
        <div class="user-info">
          <div class="user-name" id="userName">Yükleniyor...</div>
          <div class="user-email" id="userEmail"></div>
        </div>
        <i data-lucide="log-out" style="opacity:.4;flex-shrink:0;"></i>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">İşlemler</h1>
        <p class="page-subtitle">Tüm gelir ve giderlerini yönet</p>
      </div>
      <button class="btn btn-primary" id="newBtn"><i data-lucide="plus"></i> Yeni İşlem</button>
    </div>

    <!-- Filtreler -->
    <div class="filter-bar">
      <div class="form-group">
        <label class="form-label">Tür</label>
        <select class="form-control" id="filterTur">
          <option value="">Tümü</option>
          <option value="gelir">Gelir</option>
          <option value="gider">Gider</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Kategori</label>
        <select class="form-control" id="filterKat"><option value="">Tümü</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">Başlangıç</label>
        <input class="form-control" type="date" id="filterBas" />
      </div>
      <div class="form-group">
        <label class="form-label">Bitiş</label>
        <input class="form-control" type="date" id="filterBit" />
      </div>
      <button class="btn btn-secondary" id="filterBtn"><i data-lucide="search"></i> Filtrele</button>
      <button class="btn btn-ghost" id="resetBtn"><i data-lucide="x"></i></button>
    </div>

    <!-- Özet -->
    <div class="stats-grid mb-24" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat-card gelir">
        <div class="stat-label">Toplam Gelir</div>
        <div class="stat-value" id="ozGelir">—</div>
      </div>
      <div class="stat-card gider">
        <div class="stat-label">Toplam Gider</div>
        <div class="stat-value" id="ozGider">—</div>
      </div>
      <div class="stat-card bakiye">
        <div class="stat-label">Net Bakiye</div>
        <div class="stat-value" id="ozBakiye">—</div>
      </div>
    </div>

    <!-- Tablo -->
    <div class="card" style="padding:0;">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Tarih</th>
              <th>Açıklama</th>
              <th>Kategori</th>
              <th>Tür</th>
              <th class="text-right">Miktar</th>
              <th class="text-center">İşlemler</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6"><div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Ekle / Düzenle Modal -->
<div class="modal-overlay" id="txModal">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Yeni İşlem</span>
      <button class="btn btn-ghost btn-icon" data-close-modal="txModal"><i data-lucide="x"></i></button>
    </div>
    <form id="txForm" novalidate>
      <input type="hidden" id="editId" />
      <div class="form-grid" style="gap:16px;">
        <!-- Tür seçimi -->
        <div class="form-group">
          <label class="form-label">Tür</label>
          <div style="display:flex;gap:10px;">
            <label style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;">
              <input type="radio" name="tur" value="gider" checked style="accent-color:var(--red);" /> <span style="color:var(--red);font-weight:600;">↓ Gider</span>
            </label>
            <label style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;">
              <input type="radio" name="tur" value="gelir" style="accent-color:var(--green);" /> <span style="color:var(--green);font-weight:600;">↑ Gelir</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Kategori</label>
          <select class="form-control" id="formKat" required><option value="">Seçin...</option></select>
        </div>

        <div class="form-group">
          <label class="form-label">Miktar (₺)</label>
          <input class="form-control" type="number" id="formMiktar" min="0.01" step="0.01" placeholder="0,00" required />
        </div>

        <div class="form-group">
          <label class="form-label">Tarih</label>
          <input class="form-control" type="date" id="formTarih" required />
        </div>

        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Açıklama <span style="color:var(--text-3)">(isteğe bağlı)</span></label>
          <input class="form-control" type="text" id="formAciklama" placeholder="Kısa bir not..." maxlength="255" />
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:24px;">
        <button type="submit" class="btn btn-primary" id="saveBtn" style="flex:1;justify-content:center;">Kaydet</button>
        <button type="button" class="btn btn-secondary" data-close-modal="txModal">İptal</button>
      </div>
      <div id="formErr" style="color:var(--red);font-size:.82rem;margin-top:10px;display:none;"></div>
    </form>
  </div>
</div>

<!-- Silme Onay Modal -->
<div class="modal-overlay" id="delModal">
  <div class="modal" style="max-width:380px;text-align:center;">
    <div style="font-size:2.5rem;margin-bottom:12px;">🗑️</div>
    <h3 style="margin-bottom:8px;">Kaydı Sil</h3>
    <p style="color:var(--text-2);font-size:.9rem;margin-bottom:24px;">Bu işlem kalıcı olarak silinecek. Devam etmek istiyor musun?</p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-danger" id="confirmDel" style="flex:1;justify-content:center;">Evet, Sil</button>
      <button class="btn btn-secondary" data-close-modal="delModal" style="flex:1;justify-content:center;">Vazgeç</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="../assets/js/main.js"></script>
<script>
let allCategories = [];
let deleteId = null;

// Kategorileri yükle ve select'leri doldur
async function loadCategories() {
  const data = await Categories.list();
  allCategories = data.categories;
  const filterSel = document.getElementById('filterKat');
  data.categories.forEach(c => {
    filterSel.add(new Option(`${c.tur === 'gelir' ? '↑' : '↓'} ${c.ad}`, c.id));
  });
}

// Tür değişince kategori filtrele
function filterFormCategories(tur) {
  const sel = document.getElementById('formKat');
  sel.innerHTML = '<option value="">Seçin...</option>';
  allCategories.filter(c => c.tur === tur).forEach(c => {
    sel.add(new Option(c.ad, c.id));
  });
}

document.querySelectorAll('input[name="tur"]').forEach(r => {
  r.addEventListener('change', () => filterFormCategories(r.value));
});

// İşlemleri yükle ve tabloya bas
async function loadTransactions() {
  const params = {};
  const tur = document.getElementById('filterTur').value;
  const kat = document.getElementById('filterKat').value;
  const bas = document.getElementById('filterBas').value;
  const bit = document.getElementById('filterBit').value;
  if (tur) params.tur = tur;
  if (kat) params.category_id = kat;
  if (bas) params.baslangic = bas;
  if (bit) params.bitis = bit;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div></td></tr>';

  try {
    const data = await Transactions.list(params);
    const { transactions: list, ozet } = data;

    document.getElementById('ozGelir').textContent  = formatPara(ozet.toplam_gelir);
    document.getElementById('ozGider').textContent  = formatPara(ozet.toplam_gider);
    document.getElementById('ozBakiye').textContent = formatPara(ozet.bakiye);

    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div><p>Bu kriterlerde işlem bulunamadı</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = list.map(t => `
      <tr>
        <td style="color:var(--text-1);font-weight:500;">${formatTarih(t.tarih, {day:'2-digit',month:'short',year:'numeric'})}</td>
        <td>${t.aciklama || '<span style="color:var(--text-3);">—</span>'}</td>
        <td><span class="cat-dot" style="--dot-color:${t.renk}">${t.kategori}</span></td>
        <td><span class="badge badge-${t.tur}">${t.tur === 'gelir' ? '↑ Gelir' : '↓ Gider'}</span></td>
        <td class="text-right"><span class="amount-${t.tur}">${t.tur === 'gelir' ? '+' : '-'}${formatPara(t.miktar)}</span></td>
        <td class="text-center">
          <div style="display:flex;gap:6px;justify-content:center;">
            <button class="btn btn-ghost btn-icon btn-sm" onclick="openEdit(${t.id},'${t.tur}',${t.category_id},${t.miktar},'${t.aciklama||''}','${t.tarih}')" title="Düzenle"><i data-lucide="pencil" style="width:14px;height:14px;"></i></button>
            <button class="btn btn-danger btn-icon btn-sm" onclick="openDelete(${t.id})" title="Sil"><i data-lucide="trash-2" style="width:14px;height:14px;"></i></button>
          </div>
        </td>
      </tr>
    `).join('');
    lucide.createIcons();
  } catch(e) { Toast.error(e.message); }
}

// Yeni işlem modal
document.getElementById('newBtn').addEventListener('click', () => {
  document.getElementById('editId').value = '';
  document.getElementById('modalTitle').textContent = 'Yeni İşlem';
  document.getElementById('txForm').reset();
  document.getElementById('formTarih').value = new Date().toISOString().split('T')[0];
  filterFormCategories('gider');
  document.getElementById('formErr').style.display = 'none';
  Modal.open('txModal');
});

function openEdit(id, tur, catId, miktar, aciklama, tarih) {
  document.getElementById('editId').value = id;
  document.getElementById('modalTitle').textContent = 'İşlemi Düzenle';
  document.querySelector(`input[name="tur"][value="${tur}"]`).checked = true;
  filterFormCategories(tur);
  document.getElementById('formKat').value = catId;
  document.getElementById('formMiktar').value = miktar;
  document.getElementById('formAciklama').value = aciklama;
  document.getElementById('formTarih').value = tarih;
  document.getElementById('formErr').style.display = 'none';
  Modal.open('txModal');
}

function openDelete(id) {
  deleteId = id;
  Modal.open('delModal');
}

// Form kaydet
document.getElementById('txForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('formErr');
  const btn   = document.getElementById('saveBtn');
  const editId  = document.getElementById('editId').value;
  const tur     = document.querySelector('input[name="tur"]:checked').value;
  const catId   = parseInt(document.getElementById('formKat').value);
  const miktar  = parseFloat(document.getElementById('formMiktar').value);
  const aciklama= document.getElementById('formAciklama').value.trim();
  const tarih   = document.getElementById('formTarih').value;

  if (!catId || !miktar || miktar <= 0 || !tarih) {
    errEl.textContent = 'Lütfen zorunlu alanları doldurun.';
    errEl.style.display = 'block'; return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="margin:0 auto;"></div>';
  errEl.style.display = 'none';

  try {
    const payload = { tur, category_id: catId, miktar, aciklama, tarih };
    if (editId) {
      await Transactions.update(editId, payload);
      Toast.success('İşlem güncellendi');
    } else {
      await Transactions.create(payload);
      Toast.success('İşlem eklendi');
    }
    Modal.close('txModal');
    loadTransactions();
  } catch(err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Kaydet';
  }
});

// Silme onayla
document.getElementById('confirmDel').addEventListener('click', async () => {
  if (!deleteId) return;
  try {
    await Transactions.remove(deleteId);
    Toast.success('Kayıt silindi');
    Modal.close('delModal');
    loadTransactions();
  } catch(e) { Toast.error(e.message); }
  deleteId = null;
});

// Filtre butonları
document.getElementById('filterBtn').addEventListener('click', loadTransactions);
document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('filterTur').value = '';
  document.getElementById('filterKat').value = '';
  document.getElementById('filterBas').value = '';
  document.getElementById('filterBit').value = '';
  loadTransactions();
});

// Başlat
(async () => {
  try { await Auth.ben(); } catch { window.location.href = '/pages/giris.html'; return; }
  await loadCategories();
  await loadTransactions();
  lucide.createIcons();
})();
</script>
</body>
</html>
